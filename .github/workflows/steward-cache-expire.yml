on:
  push:
jobs:
  steward-cache-avoid-expire:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/cache/restore@v5
      with:
        path: /home/runner/scala-steward/workspace
        key: scala-steward-
        restore-keys: scala-steward-
        fail-on-cache-miss: true
        lookup-only: true
